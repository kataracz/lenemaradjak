name: Deploy
on:
  push:
    branches: [master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      frontend: ${{ steps.check.outputs.frontend }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 2
      - id: check
        run: |
          COUNT=$(git diff --name-only HEAD^1 HEAD \
            -- src/ public/ index.html 'vite.config.*' \
               package.json package-lock.json | wc -l)
          echo "frontend=$([[ $COUNT -gt 0 ]] && echo true || echo false)" \
            >> $GITHUB_OUTPUT

  deploy-hosting:
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
      - run: npm ci
      - run: npm run build
        env:
          VITE_YOUTUBE_API_KEY: ${{ secrets.VITE_YOUTUBE_API_KEY }}
      - uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
      - run: |
          OUTPUT=$(npx firebase-tools deploy --only hosting --project lenemaradjak 2>&1)
          EXIT=$?
          echo "$OUTPUT"
          if [ $EXIT -ne 0 ]; then
            echo "$OUTPUT" | grep -q "supplied version is the current active version" \
              && echo "Already on the current active version — nothing to release." \
              || exit $EXIT
          fi

  deploy-proxy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
      - uses: google-github-actions/setup-gcloud@v3
      - run: |
          BUILD_ID=$(gcloud builds submit \
            --tag europe-west1-docker.pkg.dev/lenemaradjak/lenemaradjak/proxy:${{ github.sha }} \
            --async \
            --format='value(id)')
          echo "Build submitted: $BUILD_ID"
          while true; do
            STATUS=$(gcloud builds describe "$BUILD_ID" --format='value(status)')
            echo "Build status: $STATUS"
            case "$STATUS" in
              SUCCESS) break ;;
              FAILURE|CANCELLED|TIMEOUT|INTERNAL_ERROR|EXPIRED)
                echo "Build failed: $STATUS"; exit 1 ;;
            esac
            sleep 10
          done
      - run: |
          gcloud run deploy lenemaradjak-proxy \
            --image europe-west1-docker.pkg.dev/lenemaradjak/lenemaradjak/proxy:${{ github.sha }} \
            --region europe-west1 \
            --service-account cloudrun-proxy-sa@lenemaradjak.iam.gserviceaccount.com \
            --min-instances 0 \
            --max-instances 2 \
            --allow-unauthenticated \
            --set-env-vars "ALLOWED_ORIGIN=https://lenemaradjak.web.app,DEV_CONTACT=${{ secrets.DEV_CONTACT }}" \
            --set-secrets "UPSTASH_REDIS_REST_URL=UPSTASH_REDIS_REST_URL:latest,UPSTASH_REDIS_REST_TOKEN=UPSTASH_REDIS_REST_TOKEN:latest"
